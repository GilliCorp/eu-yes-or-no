        publisher: "Government of Iceland"
        tier: primary
  - claim:
      is: "Jafnvel þótt Ísland gangi í ESB er evran mörg ár í burtu: minnst tvö ár í ERM II og svo Maastricht-skilyrðin. Hversu langt það tæki ræðst af verðbólgu og vaxtasveiflum á Íslandi."
      en: "Even if Iceland joins the EU, the euro is many years away: at least two years in ERM II and then the Maastricht criteria. How long it would take depends on Iceland's inflation and interest-rate volatility."
    confidence: high
    sources:
      - title: "ERM II — the EU's exchange-rate mechanism"
        url: "https://economy-finance.ec.europa.eu/euro/enlargement-euro-area/adoption-fixed-euro-conversion-rate/erm-ii-eus-exchange-rate-mechanism_en"
        publisher: "European Commission"
        tier: primary
  - claim:
      is: "Óvíst er hvort lánveitendur og lántakar myndu raunverulega hætta með verðtryggð lán þótt verðbólga lækkaði. Reynslan sýnir vana: þegar vextir hækkuðu eftir 2023 leituðu heimili aftur í verðtryggð lán."
      en: "It is uncertain whether lenders and borrowers would actually abandon indexed loans even if inflation fell. Experience shows habit: when rates rose after 2023, households moved back toward indexed loans."
    confidence: medium
    sources:
      - title: "Breytingar á lánaumhverfi heimila"
