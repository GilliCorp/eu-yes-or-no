order: 1

title:
  is: "Buddan þín"
  en: "Your money"

tldr:
  is: "ESB-aðild myndi ekki banna verðtrygginguna — íslenskir dómstólar og stjórnvöld eru þegar að breyta henni meira en Brussel myndi gera."
  en: "EU membership would not ban verðtrygging — Iceland's own courts and government are already reshaping it more than Brussels would."

summary:
  is: >-
    Stóra spurningin um buddu heimilanna er verðtryggingin (vísitölubinding
    húsnæðislána). Algengur misskilningur er að ESB-aðild myndi sjálfkrafa afnema
    hana — en það er ekki rétt. ESB/EES-réttur leyfir verðtryggingu, gerir aðeins
    kröfur um gagnsæi, og þær reglur gilda nú þegar á Íslandi gegnum EES. Það sem
    gæti gert verðtrygginguna óþarfa er evran — en hún er margra ára ferli sem
    byggir á lágri verðbólgu, sem er einmitt það sem dregur úr þörfinni fyrir
    verðtryggingu í fyrsta lagi. Á meðan er mesti þrýstingurinn á verðtrygginguna
    innlendur: dómar Hæstaréttar og áform stjórnvalda.
  en: >-
    The big household-budget question is verðtrygging (CPI-indexation of
    mortgages). A common misconception is that EU membership would automatically
    abolish it — but that is not true. EU/EEA law permits indexation, only
    requires transparency, and those rules already apply in Iceland through the
    EEA. What could make verðtrygging unnecessary is the euro — but that is a
    multi-year process resting on low inflation, which is exactly what reduces the
    need for indexation in the first place. Meanwhile, the biggest pressure on
    verðtrygging is domestic: Supreme Court rulings and government plans.

today:
  is: >-
    Verðtryggingin er lögleg samkvæmt lögum nr. 38/2001 og lýtur EES-reglum um
    neytendalán sem gilda nú þegar á Íslandi. Hvorki EFTA-dómstóllinn (mál E-25/13
    og E-27/13) né Eftirlitsstofnun EFTA hafa dæmt verðtrygginguna ólögmæta. En
    árið 2025 dæmdi Hæstiréttur skilmála bankanna um breytilega vexti ólögmæta að
    hluta, bankar gerðu tímabundið hlé á verðtryggðum lánum, og stjórnvöld kynntu
    áform um að minnka vægi þeirra frá 2027.
  en: >-
    Verðtrygging is legal under Act No. 38/2001 and follows EEA consumer-credit
    rules that already apply in Iceland. Neither the EFTA Court (cases E-25/13 and
    E-27/13) nor the EFTA Surveillance Authority has ruled indexation unlawful.
    But in 2025 the Supreme Court partly invalidated the banks' variable-rate
    terms, banks temporarily paused indexed loans, and the government announced
    plans to reduce their weight from 2027.

asMember:
  is: >-
    Lagalega myndi lítið breytast: sömu neytendareglur gilda nú þegar gegnum EES
    og verðtrygging var aldrei sérstakt mál í aðildarviðræðunum 2010–2013. Aðild
    jafngildir ekki upptöku evru: ný ríki þurfa minnst tvö ár í ERM II og að
    uppfylla Maastricht-skilyrðin (lág verðbólga, samræmdir vextir) — margra ára
    ferli sem hefst fyrst eftir inngöngu. Það er evran, ekki aðildin sjálf, sem
    gæti gert verðtrygginguna óþarfa.
  en: >-
    Legally, little would change: the same consumer rules already apply through
    the EEA, and verðtrygging was never a distinct issue in the 2010–2013
    accession talks. Membership does not equal euro adoption: new states need at
    least two years in ERM II and must meet the Maastricht criteria (low
    inflation, converged interest rates) — a multi-year process that only begins
    after joining. It is the euro, not membership itself, that could make
    verðtrygging unnecessary.

gains:
  - claim:
      is: "Með evru hverfur gengisfall krónunnar sem keyrir verðbólgu beint inn í verðtryggð lán. Eftir hrunið 2008 féll krónan um meira en helming og um 80% skulda heimila voru verðtryggð — hækkunin lenti beint á lántökum."
      en: "The euro removes the króna devaluation that drives inflation straight into indexed loans. After the 2008 crash the króna fell by more than half and about 80% of household debt was indexed — the rise landed directly on borrowers."
    affects: ["homeowners", "borrowers"]
    confidence: high
    sources:
      - title: "Economic Affairs No. 6 — Iceland's currency and exchange rate policy options"
        url: "https://www.cb.is/library/Skraarsafn---EN/Economic-Affairs/Economic%20Affairs_no%206.pdf"
        publisher: "Central Bank of Iceland"
        tier: primary
  - claim:
      is: "Til að taka upp evru þarf lága og stöðuga verðbólgu og lægri vexti (Maastricht-skilyrðin) — einmitt þær aðstæður þar sem verðtryggingin missir tilgang sinn."
      en: "Adopting the euro requires low, stable inflation and lower interest rates (the Maastricht criteria) — exactly the conditions under which verðtrygging loses its purpose."
    affects: ["borrowers"]
    confidence: high
    sources:
      - title: "Convergence criteria for joining the euro area"
        url: "https://www.ecb.europa.eu/ecb/orga/escb/html/convergence-criteria.en.html"
        publisher: "European Central Bank"
        tier: primary
  - claim:
      is: "Stór hluti hárra vaxta á Íslandi er áhættuálag vegna lítillar og sveiflukenndrar krónu. Evran getur lækkað það álag — og þar með vaxtakostnað heimila — að því gefnu að ríkisfjármál haldist í lagi."
      en: "A large part of Iceland's high interest rates is a risk premium tied to the small, volatile króna. The euro can lower that premium — and so households' interest costs — provided public finances stay sound."
    affects: ["borrowers", "homeowners"]
    confidence: medium
    sources:
      - title: "Upptaka evru og vextir á Íslandi"
        url: "https://ioes.hi.is/files/2021-05/Upptaka-Evru-og-vextir-a-Islandi.pdf"
        publisher: "Institute of Economic Studies, University of Iceland"
        tier: academic

losses:
  - claim:
      is: "Sjálfstæð króna virkaði sem höggdeyfir í endurreisninni eftir 2008: gengisfall jók samkeppnishæfni og flýtti bata. Evruríki geta ekki fellt eigin gjaldmiðil til að bregðast við áföllum."
      en: "An independent króna acted as a shock absorber after 2008: devaluation boosted competitiveness and sped the recovery. Eurozone members cannot devalue their own currency to respond to shocks."
    affects: ["everyone"]
    confidence: high
    sources:
      - title: "Iceland's financial crisis and recovery (briefing)"
        url: "https://www.europarl.europa.eu/RegData/etudes/briefing_note/join/2014/522331/EXPO-AFET_SP(2014)522331_EN.pdf"
        publisher: "European Parliament"
        tier: primary
  - claim:
      is: "Lægri vextir vegna evru geta horfið aftur ef ríkisfjármálin fara úr böndunum. Evran er ekki töfralausn — agi í eigin hagstjórn skiptir áfram máli."
      en: "Lower interest rates from the euro can disappear again if public finances slip. The euro is no magic fix — discipline in domestic policy still matters."
    affects: ["taxpayers", "borrowers"]
    confidence: high
    sources:
      - title: "Upptaka evru og vextir á Íslandi"
        url: "https://ioes.hi.is/files/2021-05/Upptaka-Evru-og-vextir-a-Islandi.pdf"
        publisher: "Institute of Economic Studies, University of Iceland"
        tier: academic
  - claim:
      is: "Með evru setur Seðlabanki Evrópu vexti fyrir allt evrusvæðið, ekki sérsniðna að íslensku hagsveiflunni. Það getur þýtt of háa eða of lága vexti á röngum tíma fyrir Ísland."
      en: "With the euro, the European Central Bank sets interest rates for the whole euro area, not tailored to Iceland's economic cycle. That can mean rates too high or too low at the wrong time for Iceland."
    affects: ["everyone", "borrowers"]
    confidence: medium
    sources:
      - title: "Iceland's financial crisis and recovery (briefing)"
        url: "https://www.europarl.europa.eu/RegData/etudes/briefing_note/join/2014/522331/EXPO-AFET_SP(2014)522331_EN.pdf"
        publisher: "European Parliament"
        tier: primary

uncertain:
  - claim:
      is: "Mesti þrýstingurinn á verðtrygginguna núna er innlendur, ekki frá ESB: Hæstiréttur dæmdi vaxtaskilmála bankanna ólögmæta að hluta (okt. og des. 2025), bankar gerðu hlé á verðtryggðum lánum, og stjórnvöld ætla að minnka vægi verðtryggðra íbúðalána frá 2027."
      en: "The biggest pressure on verðtrygging right now is domestic, not from the EU: the Supreme Court partly invalidated the banks' rate terms (Oct and Dec 2025), banks paused indexed loans, and the government plans to reduce the weight of indexed mortgages from 2027."
    confidence: high
    sources:
      - title: "Breytilegir vextir Íslandsbanka ólöglegir (14 Oct 2025)"
        url: "https://www.ruv.is/frettir/innlent/2025-10-14-breytilegir-vextir-islandsbanka-ologlegir-456101"
