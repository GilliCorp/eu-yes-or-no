        publisher: "European Commission"
        tier: primary
  - claim:
      is: "Óvíst er hvort lánveitendur og lántakar myndu raunverulega hætta með verðtryggð lán þótt verðbólga lækkaði. Reynslan sýnir vana: þegar vextir hækkuðu eftir 2023 leituðu heimili aftur í verðtryggð lán."
      en: "It is uncertain whether lenders and borrowers would actually abandon indexed loans even if inflation fell. Experience shows habit: when rates rose after 2023, households moved back toward indexed loans."
