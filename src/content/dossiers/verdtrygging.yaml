        url: "https://www.stjornarradid.is/efst-a-baugi/frettir/stok-frett/2025/10/29/Fyrsti-husnaedispakki-rikisstjornarinnar-kynntur/"
        publisher: "Government of Iceland"
        tier: primary
  - claim:
      is: "Jafnvel þótt Ísland gangi í ESB er evran mörg ár í burtu (minnst tvö ár í ERM II og svo Maastricht). Hve langt það tæki ræðst af verðbólgu og vaxtasveiflum á Íslandi."
      en: "Even if Iceland joins the EU, the euro is many years away (at least two years in ERM II, then Maastricht). How long it would take depends on Iceland's inflation and interest-rate volatility."
    confidence: high
    sources:
      - title: "ERM II — the EU's exchange-rate mechanism"
