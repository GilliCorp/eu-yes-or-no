order: 1

title:
  is: "Verðtrygging"
  en: "Verðtrygging — inflation indexing"

tldr:
  is: "Verðtrygging er ekki ESB-mál: aðild myndi hvorki banna hana né breyta henni beint. Hún er hér því evran myndi breyta því sem lætur verðtrygginguna bíta — verðbólgunni."
  en: "Verðtrygging isn't an EU matter: membership would neither ban it nor change it directly. It's here because the euro would change the one thing that makes verðtrygging bite — inflation."

summary:
  is: >-
    Verðtrygging bindur höfuðstól láns við vísitölu neysluverðs, svo skuldin fylgir
    verðbólgu. Algengur misskilningur er að ESB-aðild myndi afnema hana — en það er
    ekki rétt, og verðtrygging var ekki einu sinni á dagskrá í aðildarviðræðunum.
    ESB/EES-réttur leyfir verðtryggingu (með gagnsæiskröfum) og þær reglur gilda nú
    þegar. **Ástæðan fyrir því að við tökum hana samt fyrir er óbein:** evran myndi
    fjarlægja háu krónuverðbólguna sem gerir verðtrygginguna íþyngjandi í fyrsta
    lagi. Á meðan er mesti þrýstingurinn á verðtrygginguna innlendur — dómstólar og
    stjórnvöld — ekki frá Brussel. (Áhrifin á budduna sjálfa eru í kaflanum um
    húsnæðislán.)
  en: >-
    Verðtrygging ties a loan's principal to the consumer price index, so the debt
    tracks inflation. A common misconception is that EU membership would abolish it
    — but that's wrong, and verðtrygging wasn't even on the table in the accession
    talks. EU/EEA law permits indexation (with transparency rules) and those rules
    already apply. **The reason we cover it anyway is indirect:** the euro would
    remove the high króna inflation that makes verðtrygging burdensome in the first
    place. Meanwhile the biggest pressure on verðtrygging is domestic — courts and
    government — not Brussels. (The effect on your actual wallet is in the home-loan
    chapter.)

today:
  is: >-
    Verðtryggingin er lögleg samkvæmt lögum nr. 38/2001 og lýtur EES-reglum um
    neytendalán sem gilda nú þegar. Hvorki EFTA-dómstóllinn (mál E-25/13 og E-27/13)
    né Eftirlitsstofnun EFTA hafa dæmt hana ólögmæta. Árið 2025 dæmdi Hæstiréttur þó
    vaxtaskilmála bankanna ólögmæta að hluta, bankar gerðu tímabundið hlé á
    verðtryggðum lánum, og stjórnvöld kynntu áform um að minnka vægi þeirra frá 2027
    — allt innlent og óháð ESB.
  en: >-
    Verðtrygging is legal under Act No. 38/2001 and follows EEA consumer-credit rules
    that already apply. Neither the EFTA Court (cases E-25/13 and E-27/13) nor the
    EFTA Surveillance Authority has ruled it unlawful. In 2025, however, the Supreme
    Court partly invalidated the banks' rate terms, banks paused indexed loans, and
    the government announced plans to reduce their weight from 2027 — all domestic and
    independent of the EU.

asMember:
  is: >-
    Lagalega myndi ekkert breytast: sömu reglur gilda gegnum EES og verðtrygging var
    aldrei samningsatriði. Breytingin væri óbein og kæmi með evru — sem er margra ára
    ferli (minnst tvö ár í ERM II + Maastricht-skilyrðin). Maastricht krefst lágrar,
    stöðugrar verðbólgu, og það er einmitt lág verðbólga sem gerir verðtrygginguna
    óþarfa. Evran bannar hana sem sagt ekki; hún fjarlægir ástæðuna fyrir henni.
  en: >-
    Legally nothing would change: the same rules apply via the EEA and verðtrygging
    was never a negotiating point. The change would be indirect and come through the
    euro — a multi-year process (at least two years in ERM II + the Maastricht
    criteria). Maastricht requires low, stable inflation, and it is precisely low
    inflation that makes verðtrygging unnecessary. So the euro doesn't ban it; it
    removes the reason for it.

gains:
  - claim:
      is: "Evran fjarlægir gengisfall krónunnar sem keyrir verðbólgu beint inn í verðtryggð lán. Eftir hrunið 2008 féll krónan um meira en helming og um 80% skulda heimila voru verðtryggð — hækkunin lenti beint á lántökum."
      en: "The euro removes the króna devaluation that drives inflation straight into indexed loans. After the 2008 crash the króna fell by more than half and about 80% of household debt was indexed — the rise landed directly on borrowers."
    affects: ["homeowners", "borrowers"]
    confidence: high
    sources:
      - title: "Economic Affairs No. 6 — Iceland's currency and exchange rate policy options"
        url: "https://www.cb.is/library/Skraarsafn---EN/Economic-Affairs/Economic%20Affairs_no%206.pdf"
        publisher: "Central Bank of Iceland"
        tier: primary
  - claim:
      is: "Til að taka upp evru þarf lága og stöðuga verðbólgu (Maastricht-skilyrðin) — einmitt þær aðstæður þar sem verðtryggingin missir tilgang sinn."
      en: "Adopting the euro requires low, stable inflation (the Maastricht criteria) — exactly the conditions under which verðtrygging loses its purpose."
    affects: ["borrowers"]
    confidence: high
    sources:
      - title: "Convergence criteria for joining the euro area"
        url: "https://www.ecb.europa.eu/ecb/orga/escb/html/convergence-criteria.en.html"
        publisher: "European Central Bank"
        tier: primary

losses:
  - claim:
      is: "Verðtryggingin gerir lægri mánaðargreiðslur mögulegar í háu vaxtaumhverfi. Hyrfi hún án þess að vextir lækkuðu fyrst myndi greiðslubyrði þyngjast — hún er ekki bara baggi, hún er líka tæki."
      en: "Verðtrygging makes lower monthly payments possible in a high-rate environment. If it disappeared without rates falling first, the payment burden would get heavier — it's not only a burden, it's also a tool."
    affects: ["borrowers"]
    confidence: medium
    sources:
      - title: "Economic Affairs No. 6 — Iceland's currency and exchange rate policy options"
        url: "https://www.cb.is/library/Skraarsafn---EN/Economic-Affairs/Economic%20Affairs_no%206.pdf"
        publisher: "Central Bank of Iceland"
        tier: primary
  - claim:
      is: "Lág verðbólga — forsenda þess að verðtryggingin víki — kemur ekki sjálfkrafa við inngöngu, og evran er ekki eina leiðin að henni. Þetta er því í grunninn ekki ESB-spurning."
      en: "Low inflation — the precondition for verðtrygging to fade — doesn't arrive automatically on accession, and the euro isn't the only route to it. So this is fundamentally not an EU question."
    affects: ["everyone"]
    confidence: medium
    sources:
      - title: "Upptaka evru og vextir á Íslandi"
        url: "https://ioes.hi.is/files/2021-05/Upptaka-Evru-og-vextir-a-Islandi.pdf"
        publisher: "Institute of Economic Studies, University of Iceland"
        tier: academic

uncertain:
  - claim:
      is: "Mesti þrýstingurinn á verðtrygginguna núna er innlendur, ekki frá ESB: Hæstiréttur dæmdi vaxtaskilmála bankanna ólögmæta að hluta (okt. og des. 2025), bankar gerðu hlé á verðtryggðum lánum, og stjórnvöld ætla að minnka vægi verðtryggðra íbúðalána frá 2027."
      en: "The biggest pressure on verðtrygging right now is domestic, not from the EU: the Supreme Court partly invalidated the banks' rate terms (Oct and Dec 2025), banks paused indexed loans, and the government plans to reduce the weight of indexed mortgages from 2027."
    confidence: high
    sources:
      - title: "Breytilegir vextir Íslandsbanka ólöglegir (14 Oct 2025)"
        url: "https://www.ruv.is/frettir/innlent/2025-10-14-breytilegir-vextir-islandsbanka-ologlegir-456101"
